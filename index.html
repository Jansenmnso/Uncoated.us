<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uncoated.us - Coming Soon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Verdana, sans-serif;
      background: linear-gradient(135deg, #0B1F3F, #1A3A6F);
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      padding: 20px;
    }

    /* Top Bar */
    .top-bar {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
    }

    .logo-left {
      font-family: Verdana;
      font-weight: bold;
      font-style: italic;
      color: white;
    }

    .logo-right {
      font-family: "Times New Roman", serif;
      color: white;
    }

    /* Podcast Logo Image */
    .main-logo {
      width: 320px;
      max-width: 80%;
      margin-bottom: 25px;
    }

    h1 {
      font-weight: normal;
      font-size: 3rem;
      margin-bottom: 20px;
      color: #FFFFFF;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 40px;
      color: #E0E0E0;
    }

    /* Glass Button */
    .btn {
      padding: 15px 30px;
      font-size: 1rem;
      font-weight: bold;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      transition: 0.3s ease;
    }

    .btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.05);
    }

    footer {
      position: absolute;
      bottom: 15px;
      font-size: 0.85rem;
      color: #B0B0B0;
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <div class="logo-left">UNCOATED.US</div>
    <div class="logo-right">MNSO</div>
  </div>

  <!-- YOUR TRANSPARENT PNG LOGO -->
  <img 
    src="02AA3B0A-36FE-43F1-8F75-1221B4EDCCB2.png" 
    alt="Uncoated.us Logo"
    class="main-logo"
  >

  <h1>Stay Tuned</h1>
  <p>UNCOATED.US Podcast Coming Soon</p>

  <a href="https://www.mnso.live" class="btn" target="_blank">
    Visit MNSO
  </a>

  <footer>
    &copy; 2026 Uncoated.us | Powered by MNSO
  </footer>

</body>
</html>
