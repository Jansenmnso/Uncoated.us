<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uncoated.us - Coming Soon</title>
  <!-- Google Fonts for clean, professional look -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Roboto+Slab:wght@700&display=swap" rel="stylesheet">
  <style>
    /* Reset & basic styling */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0B1F3F, #1A3A6F);
      color: #FFFFFF;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-family: 'Roboto Slab', serif;
      font-size: 3rem;
      letter-spacing: 2px;
      margin-bottom: 20px;
      color: #FFD700; /* Gold accent for MNSO feel */
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 40px;
      color: #E0E0E0;
    }
    .btn {
      display: inline-block;
      padding: 15px 30px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      color: #0B1F3F;
      background-color: #FFD700;
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    .btn:hover {
      background-color: #FFC300;
      transform: scale(1.05);
    }
    footer {
      position: absolute;
      bottom: 15px;
      font-size: 0.85rem;
      color: #B0B0B0;
    }
    @media (max-width: 600px) {
      h1 {
        font-size: 2.2rem;
      }
      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <h1>Stay Tuned</h1>
  <p>UNCOATED.US Podcast Coming Soon</p>
  <a href="https://www.mnso.live" class="btn" target="_blank">Visit MNSO</a>
  
  <footer>
    &copy; 2026 Uncoated.us | Powered by MNSO
  </footer>
</body>
</html>
