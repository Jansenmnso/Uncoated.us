<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uncoated Podcast</title>

<style>

/* ---------- GLOBAL ---------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: Verdana, sans-serif;
background:#070B13;
color:white;
}

/* ---------- GLASS EFFECT ---------- */

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter: blur(12px);
border:1px solid rgba(255,255,255,0.15);
}

/* ---------- TOP BAR ---------- */

.topbar{

position:fixed;
top:0;
left:0;
width:100%;
height:60px;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 20px;

z-index:1000;

background:rgba(0,0,0,0.4);
backdrop-filter: blur(15px);

}

/* LOGO */

.logo{
font-weight:bold;
font-style:italic;
font-size:18px;
}

/* HAMBURGER MENU */

.menu-btn{

font-size:28px;
cursor:pointer;

}

/* ---------- SIDE MENU ---------- */

.sidebar{

position:fixed;
top:0;
left:-260px;

width:260px;
height:100%;

padding-top:80px;

transition:0.35s ease;

background:rgba(10,20,40,0.95);

backdrop-filter:blur(20px);

}

.sidebar a{

display:block;
padding:18px 25px;

color:white;
text-decoration:none;

font-size:16px;

border-bottom:1px solid rgba(255,255,255,0.08);

}

.sidebar a:hover{

background:rgba(255,255,255,0.08);

}

/* ---------- MAIN CONTENT ---------- */

main{

padding-top:80px;
padding-left:20px;
padding-right:20px;

}

/* ---------- FEATURED EPISODE ---------- */

.featured{

width:100%;
height:220px;

border-radius:16px;

background:#0E1C33;

display:flex;
align-items:center;
justify-content:center;

margin-bottom:30px;

overflow:hidden;

}

.featured img{

width:100%;
height:100%;
object-fit:cover;

}

/* ---------- SECTION TITLE ---------- */

.section-title{

font-size:20px;
margin-bottom:12px;

}

/* ---------- SCROLL PODCAST ROW ---------- */

.scroll-row{

display:flex;
gap:16px;

overflow-x:auto;

padding-bottom:10px;

}

.scroll-row::-webkit-scrollbar{
display:none;
}

/* ---------- PODCAST CARD ---------- */

.card{

min-width:160px;
height:110px;

border-radius:12px;

background:#14284A;

overflow:hidden;

cursor:pointer;

}

.card img{

width:100%;
height:100%;

object-fit:cover;

}

/* ---------- DESKTOP ADJUSTMENTS ---------- */

@media (min-width:800px){

main{
max-width:1100px;
margin:auto;
}

.featured{
height:350px;
}

.card{
min-width:200px;
height:130px;
}

}

</style>

</head>

<body>

<!-- TOP BAR -->

<div class="topbar">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="logo">UNCOATED.US</div>

</div>

<!-- SIDEBAR MENU -->

<div id="sidebar" class="sidebar">

<a href="#">Home</a>

<a href="#">Spotify Library</a>

<a href="#">YouTube Library</a>

<a href="mailto:admin@mnso.live">Contact Us</a>

</div>

<!-- MAIN PAGE -->

<main>

<!-- FEATURED VIDEO SLOT -->

<div class="featured">

<!-- Replace image later -->

<img src="featured-placeholder.jpg">

</div>

<!-- PODCAST ROW -->

<div class="section-title">Latest Episodes</div>

<div class="scroll-row">

<div class="card">
<img src="podcast1.jpg">
</div>

<div class="card">
<img src="podcast2.jpg">
</div>

<div class="card">
<img src="podcast3.jpg">
</div>

<div class="card">
<img src="podcast4.jpg">
</div>

<div class="card">
<img src="podcast5.jpg">
</div>

</div>

</main>

<!-- MENU SCRIPT -->

<script>

function toggleMenu(){

const sidebar = document.getElementById("sidebar");

if(sidebar.style.left === "0px"){
sidebar.style.left = "-260px";
}
else{
sidebar.style.left = "0px";
}

}

</script>

</body>
</html>
