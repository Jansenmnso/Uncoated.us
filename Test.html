<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uncoated.us</title>

<style>

/* ---------- GLOBAL ---------- */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

a{
text-decoration:none;
color:inherit;
}

/* ---------- HEADER ---------- */

header{
position:fixed;
top:0;
left:0;
right:0;
height:65px;

display:flex;
align-items:center;
padding:0 20px;

background:rgba(20,20,20,0.55);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,0.05);

z-index:1000;
}

/* hamburger */

.menu-btn{
font-size:26px;
cursor:pointer;
}

/* ---------- SIDE MENU ---------- */

.side-menu{
position:fixed;
top:0;
left:-270px;
width:270px;
height:100%;

background:rgba(15,15,15,0.85);
backdrop-filter:blur(22px);

padding-top:80px;

transition:0.35s;
z-index:999;
}

.side-menu a{
display:block;
padding:16px 30px;
font-size:17px;
color:#dcdcdc;
}

.side-menu a:hover{
background:rgba(255,255,255,0.05);
}

/* ---------- MAIN ---------- */

main{
padding-top:80px;
}

/* ---------- FEATURED VIDEO ---------- */

.featured{
width:92%;
max-width:950px;
height:240px;

margin:auto;

border-radius:18px;
background:#1c1c1c;

display:flex;
align-items:center;
justify-content:center;

font-size:18px;
color:#777;
}

/* ---------- SECTION ---------- */

.section{
margin-top:35px;
padding-left:20px;
}

.section h2{
font-weight:600;
margin-bottom:12px;
}

/* ---------- SCROLL ROW ---------- */

.scroll-wrapper{
position:relative;
}

.scroll-row{
display:flex;
gap:16px;

overflow-x:auto;
scroll-behavior:smooth;

padding-bottom:10px;

scrollbar-width:none;
}

.scroll-row::-webkit-scrollbar{
display:none;
}

/* podcast cards */

.card{
min-width:170px;
height:105px;

background:#1a1a1a;
border-radius:14px;

display:flex;
align-items:center;
justify-content:center;

color:#666;
font-size:14px;
}

/* ---------- SCROLL INDICATOR ---------- */

.scroll-indicator{
width:92%;
height:3px;

background:rgba(255,255,255,0.08);

margin:8px auto 0;
border-radius:3px;

position:relative;
}

.scroll-indicator-bar{
height:3px;
width:40px;

background:#3ea6ff;

border-radius:3px;

position:absolute;
left:0;
top:0;
}

/* ---------- FOOTER ---------- */

footer{
margin-top:40px;
padding:30px;
text-align:center;
font-size:13px;
color:#777;
}

</style>
</head>


<body>

<!-- SIDE MENU -->

<div id="menu" class="side-menu">

<a href="#">Spotify Library</a>

<a href="#">YouTube Library</a>

<a href="mailto:admin@mnso.live">Contact Us</a>

</div>


<!-- HEADER -->

<header>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

</header>


<!-- MAIN -->

<main>

<!-- FEATURED VIDEO -->

<div class="featured">
Featured Podcast Video
</div>


<!-- LATEST EPISODES -->

<div class="section">

<h2>Latest Episodes</h2>

<div class="scroll-wrapper">

<div id="scrollRow" class="scroll-row">

<div class="card">Podcast 1</div>

<div class="card">Podcast 2</div>

<div class="card">Podcast 3</div>

<div class="card">Podcast 4</div>

<div class="card">Podcast 5</div>

</div>

<div class="scroll-indicator">
<div id="scrollBar" class="scroll-indicator-bar"></div>
</div>

</div>

</div>

</main>


<footer>

Uncoated.us Podcast

</footer>


<script>

/* ---------- MENU ---------- */

function toggleMenu(){

let menu = document.getElementById("menu");

if(menu.style.left === "0px"){

menu.style.left = "-270px";

}else{

menu.style.left = "0";

}

}

/* ---------- SCROLL INDICATOR ---------- */

const row = document.getElementById("scrollRow");
const bar = document.getElementById("scrollBar");

row.addEventListener("scroll", () => {

const maxScroll = row.scrollWidth - row.clientWidth;

const scrollPercent = row.scrollLeft / maxScroll;

const indicatorWidth = row.clientWidth / row.scrollWidth;

const trackWidth = document.querySelector(".scroll-indicator").clientWidth;

bar.style.width = (trackWidth * indicatorWidth) + "px";

bar.style.left = (scrollPercent * (trackWidth - bar.clientWidth)) + "px";

});

</script>


</body>
</html>
