<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uncoated.us</title>

<style>

/* GLOBAL */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#0b0b0f;
color:white;
overflow-x:hidden;
}

/* HEADER */

header{

position:fixed;
top:0;
left:0;
right:0;

height:74px;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 22px;

background:linear-gradient(
180deg,
rgba(30,30,36,0.85),
rgba(18,18,22,0.7)
);

backdrop-filter:blur(18px);

border-bottom:1px solid rgba(255,255,255,0.05);

box-shadow:
0 3px 20px rgba(0,0,0,0.6),
0 0 15px rgba(60,120,255,0.2);

z-index:1000;

}

/* BLUE GLOW BAR */

header::after{

content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:2px;

background:linear-gradient(
90deg,
transparent,
#3A78FF,
transparent
);

opacity:.7;

}

/* MENU BUTTON */

.menu-btn{
font-size:28px;
cursor:pointer;
}

/* LOGO */

.header-logo{
height:46px;
max-width:240px;
object-fit:contain;
}

/* SIDE MENU */

.side-menu{

position:fixed;
top:0;
left:-280px;

width:280px;
height:100%;

background:rgba(15,15,18,0.9);
backdrop-filter:blur(20px);

padding-top:90px;

transition:0.35s ease;

z-index:999;

}

.side-menu a{

display:block;
padding:18px 32px;

font-size:17px;
color:#d7d7d7;

border-left:3px solid transparent;

}

.side-menu a:hover{

background:rgba(255,255,255,0.05);
border-left:3px solid #3A78FF;

}

/* MAIN */

main{
padding-top:100px;
}

/* FEATURED VIDEO */

.featured-container{

width:92%;
max-width:950px;

margin:auto;

border-radius:18px;
overflow:hidden;

cursor:pointer;

box-shadow:
0 10px 40px rgba(0,0,0,0.7),
0 0 25px rgba(58,120,255,0.15);

}

.featured-video{

width:100%;
height:260px;

object-fit:cover;

display:block;

}

/* SECTION */

.section{
margin-top:40px;
padding-left:20px;
}

.section h2{
font-weight:600;
margin-bottom:12px;
}

/* SCROLL ROW */

.scroll-wrapper{
position:relative;
}

.scroll-row{

display:flex;
gap:16px;

overflow-x:auto;
scroll-behavior:smooth;

padding-bottom:10px;

scrollbar-width:none;

}

.scroll-row::-webkit-scrollbar{
display:none;
}

/* EPISODE CARDS */

.card{

min-width:180px;
height:110px;

border-radius:14px;

overflow:hidden;

background:#181818;

cursor:pointer;

transition:transform .2s ease;

}

.card:hover{
transform:scale(1.05);
}

.card img{

width:100%;
height:100%;

object-fit:cover;

}

/* SCROLL INDICATOR */

.scroll-indicator{

width:92%;
height:3px;

background:rgba(255,255,255,0.08);

margin:8px auto 0;

border-radius:3px;

position:relative;

}

.scroll-indicator-bar{

height:3px;
width:40px;

background:#3A78FF;

border-radius:3px;

position:absolute;

}

/* FOOTER */

footer{

margin-top:40px;
padding:30px;

text-align:center;

font-size:13px;
color:#777;

}

</style>

</head>

<body>

<!-- SIDE MENU -->

<div id="menu" class="side-menu">

<a href="/library">Spotify Library</a>

<a href="/library">YouTube Library</a>

<a href="mailto:admin@mnso.live">Contact Us</a>

</div>

<!-- HEADER -->

<header>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<img src="02AA3B0A-36FE-43F1-8F75-1221B4EDCCB2.png" class="header-logo">

</header>

<!-- MAIN -->

<main>

<!-- FEATURED VIDEO -->

<a href="/library">

<div class="featured-container">

<video class="featured-video" autoplay muted loop playsinline>

<source src="highlight.mp4" type="video/mp4">

</video>

</div>

</a>

<!-- LATEST EPISODES -->

<div class="section">

<h2>Latest Episodes</h2>

<div class="scroll-wrapper">

<div id="scrollRow" class="scroll-row">

<a href="/library" class="card">
<img src="episode1.jpg">
</a>

<a href="/library" class="card">
<img src="episode2.jpg">
</a>

<a href="/library" class="card">
<img src="episode3.jpg">
</a>

<a href="/library" class="card">
<img src="episode4.jpg">
</a>

<a href="/library" class="card">
<img src="episode5.jpg">
</a>

</div>

<div class="scroll-indicator">

<div id="scrollBar" class="scroll-indicator-bar"></div>

</div>

</div>

</div>

</main>

<footer>

Uncoated.us Podcast

</footer>

<script>

/* MENU */

function toggleMenu(){

let menu=document.getElementById("menu");

if(menu.style.left==="0px"){
menu.style.left="-280px";
}else{
menu.style.left="0";
}

}

/* SCROLL INDICATOR */

const row=document.getElementById("scrollRow");
const bar=document.getElementById("scrollBar");

row.addEventListener("scroll",()=>{

const maxScroll=row.scrollWidth-row.clientWidth;

const percent=row.scrollLeft/maxScroll;

const track=document.querySelector(".scroll-indicator").clientWidth;

const indicatorWidth=row.clientWidth/row.scrollWidth;

bar.style.width=(track*indicatorWidth)+"px";

bar.style.left=(percent*(track-bar.clientWidth))+"px";

});

</script>

</body>
</html>
